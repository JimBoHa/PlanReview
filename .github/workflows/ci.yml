name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e '.[dev]'
      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src tests
      - name: Test
        run: |
          source .venv/bin/activate
          pytest -q
      - name: Build App Bundle
        run: scripts/build_app.sh
